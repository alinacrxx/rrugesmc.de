<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRUGES – Intro</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #120606;
    }

    body {
      position: relative;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-image:
        radial-gradient(circle at center, rgba(80, 10, 10, 0.18), transparent 60%),
        linear-gradient(180deg, rgba(10, 3, 3, 0.25), rgba(10, 3, 3, 0.25)),
        url('background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .smoke {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 80%, rgba(255,255,255,0.06), transparent 22%),
        radial-gradient(circle at 80% 75%, rgba(255,255,255,0.05), transparent 20%),
        radial-gradient(circle at 60% 90%, rgba(255,255,255,0.04), transparent 18%);
      opacity: 0.8;
      animation: smokeMove 8s ease-in-out infinite alternate;
    }

    #logo {
      position: absolute;
      top: 7vh;
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      width: min(34vw, 520px);
      max-width: 90vw;
      opacity: 0;
      filter: drop-shadow(0 0 25px rgba(80, 0, 0, 0.45));
      animation: logoFadeIn 1.8s ease forwards;
      z-index: 2;
      user-select: none;
      -webkit-user-drag: none;
    }

    #envelope {
      position: absolute;
      left: 50%;
      bottom: 6vh;
      transform: translateX(-50%) translateY(40px) scale(0.96);
      width: min(34vw, 520px);
      max-width: 90vw;
      opacity: 0;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.45));
      animation: envelopeFadeIn 1.5s ease forwards;
      animation-delay: 1.8s;
      z-index: 2;
      user-select: none;
      -webkit-user-drag: none;
    }

    #seal {
      position: absolute;
      left: 50%;
      bottom: 22vh; /* höher gesetzt */
      transform: translateX(-50%);
      width: min(4.8vw, 72px);
      height: min(4.8vw, 72px);
      min-width: 52px;
      min-height: 52px;
      border: none;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
    }

    #seal.active {
      opacity: 1;
      pointer-events: auto;
      animation: pulse 1.8s ease-in-out infinite;
    }

    #seal:hover {
      transform: translateX(-50%) scale(1.05);
      box-shadow: 0 0 0 8px rgba(255,255,255,0.04), 0 0 25px rgba(150, 15, 15, 0.7);
    }

    #seal:active {
      transform: translateX(-50%) scale(0.96);
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 4.5vh;
      transform: translateX(-50%);
      color: #f2d7b1;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 5;
    }

    .hint.show {
      opacity: 1;
    }

    .fade-out {
      animation: fadeOutScene 0.6s ease forwards;
    }

    @keyframes logoFadeIn {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.92);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }

    @keyframes envelopeFadeIn {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(40px) scale(0.96);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
      }
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(150, 15, 15, 0), 0 0 0 0 rgba(150, 15, 15, 0);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(150, 15, 15, 0.18), 0 0 20px rgba(150, 15, 15, 0.55);
      }
    }

    @keyframes smokeMove {
      0% {
        transform: translateX(-1.5%) translateY(0);
      }
      100% {
        transform: translateX(1.5%) translateY(-1%);
      }
    }

    @keyframes fadeOutScene {
      to {
        opacity: 0;
        transform: scale(1.02);
      }
    }

    @media (max-width: 1100px) {
      #logo,
      #envelope {
        width: min(52vw, 520px);
      }

      #seal {
        bottom: 16.5vh;
        width: 64px;
        height: 64px;
      }
    }

    @media (max-width: 700px) {
      #logo {
        top: 8vh;
        width: 78vw;
      }

      #envelope {
        width: 80vw;
        bottom: 8vh;
      }

      #seal {
        bottom: 18vh;
        width: 56px;
        height: 56px;
      }

      .hint {
        font-size: 12px;
        bottom: 3.5vh;
      }
    }
  </style>
</head>
<body>
  <main class="scene" id="scene">
    <div class="smoke"></div>

    <img src="logo.png" id="logo" alt="RRUGES Logo" />
    <img src="envelope.png" id="envelope" alt="Briefumschlag" />

    <button id="seal" aria-label="Weiter zur nächsten Seite" title="Weiter"></button>

    <div class="hint" id="hint">Auf das Siegel klicken</div>
  </main>

  <script>
    const NEXT_PAGE_URL = 'nextpage.html';

    const seal = document.getElementById('seal');
    const hint = document.getElementById('hint');
    const scene = document.getElementById('scene');

    window.addEventListener('load', () => {
      setTimeout(() => {
        seal.classList.add('active');
        hint.classList.add('show');
      }, 3200);
    });

    seal.addEventListener('click', () => {
      hint.textContent = 'Wird geöffnet...';
      scene.classList.add('fade-out');

      setTimeout(() => {
        window.location.href = NEXT_PAGE_URL;
      }, 550);
    });
  </script>
</body>
</html>
