<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RRUGES – Mitglieder</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      position: relative;
      background: url('background.png') center / cover no-repeat;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(8, 0, 0, 0.38);
      z-index: 0;
      pointer-events: none;
    }

    .intro-fade {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 50;
      animation: fadeIntro 1.2s ease forwards;
      pointer-events: none;
    }

    .scene {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    .scroll-wrap {
      width: min(82vw, 1250px);
      opacity: 0;
      transform-origin: top center;
      clip-path: inset(0 0 100% 0);
      filter: drop-shadow(0 22px 40px rgba(0, 0, 0, 0.45));

      animation:
        scrollDrop 0.9s ease-out forwards,
        scrollUnroll 1.5s ease-out forwards 0.85s,
        floatIdle 4.6s ease-in-out infinite 2.8s;
    }

    .scroll-wrap img {
      width: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 40;
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      background: rgba(45, 10, 10, 0.85);
      color: #f2d7b1;
      cursor: pointer;
      font-size: 14px;
      text-transform: uppercase;
    }

    @keyframes fadeIntro {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    @keyframes scrollDrop {
      0% {
        opacity: 0;
        transform: translateY(-100px) scale(0.94) rotateX(14deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(0.985) rotateX(0deg);
      }
    }

    @keyframes scrollUnroll {
      0% {
        clip-path: inset(0 0 84% 0);
        transform: scale(0.985);
      }
      25% {
        clip-path: inset(0 0 62% 0);
        transform: scale(0.992);
      }
      50% {
        clip-path: inset(0 0 38% 0);
        transform: scale(1);
      }
      75% {
        clip-path: inset(0 0 14% 0);
        transform: scale(1.004);
      }
      100% {
        clip-path: inset(0 0 0 0);
        transform: scale(1);
      }
    }

    @keyframes floatIdle {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-7px);
      }
    }

    @media (max-width: 800px) {
      body {
        overflow: auto;
      }

      .scene {
        min-height: 100vh;
        height: auto;
        padding: 90px 10px 70px;
      }

      .scroll-wrap {
        width: 98vw;
      }

      .back-button {
        top: 14px;
        left: 14px;
        font-size: 12px;
        padding: 10px 14px;
      }
    }
  </style>
</head>

<body>
  <div class="intro-fade"></div>

  <button class="back-button" onclick="window.location.href='anwesen.html'">
    Zurück
  </button>

  <main class="scene">
    <div class="scroll-wrap">
      <img src="scroll_mitglieder.png" alt="Mitgliederliste RRUGES MC">
    </div>
  </main>
</body>
</html>
