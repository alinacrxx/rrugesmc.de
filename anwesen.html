<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRUGES – Anwesen</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

body {
  background: url('background.png') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Overlay */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(10,0,0,0.5);
}

/* Szene */
.scene {
  position: relative;
  z-index: 2;
  text-align: center;
}

/* 📜 Schriftrolle */
.scroll {
  width: min(65vw, 900px);
  cursor: pointer;

  opacity: 0;
  clip-path: inset(0 0 100% 0);

  animation:
    drop 0.8s ease-out forwards,
    unroll 1.5s ease forwards 0.8s;

  transition: transform 0.3s ease;
}

.scroll:hover {
  transform: scale(1.03);
}

.scroll img {
  width: 100%;
}

/* 🎥 Video Overlay */
.video-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s ease;
}

.video-overlay.active {
  opacity: 1;
  pointer-events: all;
}

.video iframe {
  width: 70vw;
  height: 40vw;
  max-width: 900px;
  max-height: 500px;
  border: none;
  border-radius: 10px;
}

/* ❌ Close Button */
.close {
  position: absolute;
  top: 30px;
  right: 30px;
  color: white;
  font-size: 28px;
  cursor: pointer;
}

/* 🔙 Back */
.back-button {
  position: absolute;
  top: 20px;
  left: 20px;
  padding: 10px 16px;
  border-radius: 999px;
  border: none;
  background: rgba(45,10,10,0.85);
  color: #f2d7b1;
  cursor: pointer;
}

/* Animationen */
@keyframes drop {
  from { transform: translateY(-100px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

@keyframes unroll {
  from { clip-path: inset(0 0 90% 0); }
  to { clip-path: inset(0 0 0 0); }
}

</style>
</head>

<body>

<button class="back-button" onclick="window.location.href='autolackierung.html'">
  Zurück
</button>

<div class="scene">

  <!-- 📜 Schriftrolle (KLICKBAR) -->
  <div class="scroll" onclick="openVideo()">
    <img src="scroll_anwesen.png" alt="Anwesen">
  </div>

</div>

<!-- 🎥 VIDEO OVERLAY -->
<div class="video-overlay" id="videoOverlay">
  <div class="close" onclick="closeVideo()">✖</div>

  <div class="video">
    <iframe id="videoFrame"
      src=""
      allow="autoplay"
      allowfullscreen>
    </iframe>
  </div>
</div>

<script>
function openVideo() {
  const overlay = document.getElementById("videoOverlay");
  const frame = document.getElementById("videoFrame");

  frame.src = "https://www.youtube.com/embed/lBllrIEbXyY?autoplay=1";
  overlay.classList.add("active");
}

function closeVideo() {
  const overlay = document.getElementById("videoOverlay");
  const frame = document.getElementById("videoFrame");

  overlay.classList.remove("active");
  frame.src = ""; // stoppt Video
}
</script>

</body>
</html>
