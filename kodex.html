<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRUGES – Werte & Kodex</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      position: relative;
      background: url('background.png') center center / cover no-repeat;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(8, 0, 0, 0.34);
      pointer-events: none;
      z-index: 0;
    }

    .intro-fade {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 30;
      pointer-events: none;
      animation: introFade 1.2s ease forwards;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
      overflow: hidden;
      padding: 20px;
    }

    .scroll-stage {
      position: relative;
      width: min(78vw, 1150px);
      perspective: 1400px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .scroll-wrap {
      position: relative;
      width: 100%;
      opacity: 0;
      transform-origin: top center;
      clip-path: inset(0 0 100% 0);
      filter: drop-shadow(0 22px 40px rgba(0, 0, 0, 0.42));
      animation:
        scrollDrop 0.9s ease-out forwards,
        scrollUnroll 1.5s ease-out forwards 0.85s,
        floatIdle 4.6s ease-in-out infinite 2.8s;
    }

    .scroll-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .top-shadow {
      position: absolute;
      left: 6%;
      top: 0;
      width: 88%;
      height: 18%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0));
      opacity: 0;
      pointer-events: none;
      animation: shadowIn 0.7s ease forwards 1.1s;
    }

    .content {
      position: absolute;
      top: 19%;
      left: 14%;
      width: 66%;
      color: #2a120d;
      z-index: 5;
    }

    .content h1 {
      text-align: center;
      font-size: clamp(26px, 2.5vw, 46px);
      margin-bottom: 24px;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(12px);
      animation: textReveal 0.9s ease forwards 1.6s;
    }

    .point {
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(12px);
      filter: blur(2px);
    }

    .point-title {
      display: block;
      font-size: clamp(20px, 1.9vw, 34px);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 3px;
    }

    .point-desc {
      display: block;
      font-size: clamp(15px, 1.28vw, 24px);
      line-height: 1.25;
      font-weight: 500;
    }

    .point.show-1 { animation: textReveal 0.75s ease forwards 2.0s; }
    .point.show-2 { animation: textReveal 0.75s ease forwards 2.6s; }
    .point.show-3 { animation: textReveal 0.75s ease forwards 3.2s; }
    .point.show-4 { animation: textReveal 0.75s ease forwards 3.8s; }
    .point.show-5 { animation: textReveal 0.75s ease forwards 4.4s; }
    .point.show-6 { animation: textReveal 0.75s ease forwards 5.0s; }
    .point.show-7 { animation: textReveal 0.75s ease forwards 5.6s; }

    .back-button {
      position: absolute;
      top: 22px;
      left: 22px;
      z-index: 40;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: rgba(45, 10, 10, 0.82);
      color: #f2d7b1;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .back-button:hover {
      transform: scale(1.04);
      background: rgba(70, 14, 14, 0.9);
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.28);
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(35, 10, 10, 0.78);
      color: #f2d7b1;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      opacity: 0;
      animation: hintIn 0.8s ease forwards 2.4s;
    }

    @keyframes introFade {
      from { opacity: 1; }
      to { opacity: 0; visibility: hidden; }
    }

    @keyframes scrollDrop {
      0% {
        opacity: 0;
        transform: translateY(-100px) scale(0.94) rotateX(14deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(0.985) rotateX(0deg);
      }
    }

    @keyframes scrollUnroll {
      0% {
        clip-path: inset(0 0 84% 0);
        transform: scale(0.985);
      }
      25% {
        clip-path: inset(0 0 62% 0);
        transform: scale(0.992);
      }
      50% {
        clip-path: inset(0 0 38% 0);
        transform: scale(1);
      }
      75% {
        clip-path: inset(0 0 14% 0);
        transform: scale(1.004);
      }
      100% {
        clip-path: inset(0 0 0 0);
        transform: scale(1);
      }
    }

    @keyframes floatIdle {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes shadowIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes textReveal {
      from {
        opacity: 0;
        transform: translateY(12px);
        filter: blur(2px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes hintIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 1100px) {
      .scroll-stage {
        width: min(88vw, 1150px);
      }

      .content {
        top: 18.5%;
        left: 13%;
        width: 69%;
      }
    }

    @media (max-width: 800px) {
      body {
        overflow: auto;
      }

      .scene {
        min-height: 100vh;
        height: auto;
        padding: 90px 10px 70px;
      }

      .scroll-stage {
        width: 96vw;
      }

      .content {
        top: 18%;
        left: 11.5%;
        width: 74%;
      }

      .point {
        margin-bottom: 10px;
      }

      .point-title {
        font-size: clamp(12px, 2.2vw, 20px);
      }

      .point-desc {
        font-size: clamp(10px, 1.6vw, 15px);
      }

      .content h1 {
        font-size: clamp(16px, 3vw, 24px);
        margin-bottom: 12px;
      }

      .back-button {
        top: 14px;
        left: 14px;
        font-size: 12px;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="intro-fade"></div>

  <button class="back-button" onclick="window.location.href='nextpage.html'">Zurück</button>

  <main class="scene">
    <div class="scroll-stage">
      <div class="scroll-wrap">
        <img src="scroll_kodex.png" alt="Werte und Kodex" class="scroll-image">
        <div class="top-shadow"></div>

             </div>
    </div>
  </main>

  <div class="hint">Werte &amp; Kodex</div>
</body>
</html>
