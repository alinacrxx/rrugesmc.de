<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RRUGES – Geschichte</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      position: relative;
      background: url('background.png') center / cover no-repeat;
      transition: opacity 0.5s ease;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(8,0,0,0.35);
      z-index: 0;
    }

    .intro-fade {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 50;
      animation: fadeIntro 1.2s ease forwards;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
      overflow: hidden;
    }

    .scroll {
      position: relative;
      width: min(75vw, 1100px);
      transform-origin: top;
      clip-path: inset(0 0 100% 0);
      opacity: 0;

      cursor: pointer;
      transition: transform 0.25s ease, filter 0.25s ease;

      animation:
        drop 0.8s ease-out forwards,
        unroll 1.5s ease forwards 0.8s,
        float 5s ease-in-out infinite 2.5s;
    }

    .scroll:hover {
      transform: scale(1.02);
      filter: brightness(1.05);
    }

    .scroll img {
      width: 100%;
      display: block;
    }

    .content {
      position: absolute;
      top: 18%;
      left: 14%;
      width: 68%;
      color: #2b120d;
      z-index: 5;
    }

    .content h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: clamp(26px, 2.5vw, 42px);
      opacity: 0;
      animation: textIn 0.8s ease forwards 1.6s;
    }

    .story {
      white-space: pre-line;
      font-size: clamp(14px, 1.3vw, 22px);
      line-height: 1.4;
      opacity: 0;
      animation: textIn 0.8s ease forwards 2s;
    }

    .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 30;

      padding: 10px 16px;
      border-radius: 999px;
      border: none;

      background: rgba(45,10,10,0.85);
      color: #f2d7b1;

      cursor: pointer;
    }

    /* ANIMATIONEN */

    @keyframes fadeIntro {
      to { opacity: 0; visibility: hidden; }
    }

    @keyframes drop {
      from {
        opacity: 0;
        transform: translateY(-100px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes unroll {
      from { clip-path: inset(0 0 90% 0); }
      to { clip-path: inset(0 0 0 0); }
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes textIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

<div class="intro-fade"></div>

<button class="back-button" onclick="window.location.href='index.html'">
  Zurück
</button>

<div class="scene">

  <!-- KLICKBARE SCHRIFTROLLE -->
  <div class="scroll" onclick="goNext()">
    <img src="scroll.png">
  </div>

</div>

<script>
function goNext() {
  document.body.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "kodex.html";
  }, 500);
}
</script>
</body>
</html>
