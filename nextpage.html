<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRUGES – Geschichte</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      position: relative;
      background: url('background.png') center center / cover no-repeat;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(8, 0, 0, 0.38);
      z-index: 0;
      pointer-events: none;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 1;
      padding: 20px;
    }

    .intro-fade {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 10;
      pointer-events: none;
      animation: introFade 1.2s ease forwards;
    }

    .scroll-stage {
      position: relative;
      width: min(92vw, 1500px);
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1400px;
    }

    .scroll-wrap {
      position: relative;
      width: 100%;
      transform-origin: top center;
      opacity: 0;
      animation:
        scrollDrop 0.9s ease-out forwards,
        scrollUnroll 1.5s ease-out forwards 0.85s,
        floatIdle 4.2s ease-in-out infinite 2.5s;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.45));
    }

    .scroll-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      border-radius: 4px;
    }

    .scroll-top-shadow {
      position: absolute;
      top: 0;
      left: 5%;
      width: 90%;
      height: 18%;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0));
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      animation: topShadowIn 0.8s ease forwards 1.1s;
    }

    .back-button {
      position: absolute;
      top: 22px;
      left: 22px;
      z-index: 20;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: rgba(45, 10, 10, 0.82);
      color: #f2d7b1;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .back-button:hover {
      transform: scale(1.04);
      background: rgba(70, 14, 14, 0.9);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.28);
    }

    .hint {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(35, 10, 10, 0.78);
      color: #f2d7b1;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      opacity: 0;
      animation: hintIn 0.8s ease forwards 2.2s;
    }

    @keyframes introFade {
      from { opacity: 1; }
      to { opacity: 0; visibility: hidden; }
    }

    @keyframes scrollDrop {
      0% {
        opacity: 0;
        transform: translateY(-120px) scale(0.92) rotateX(16deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(0.98) rotateX(0deg);
      }
    }

    @keyframes scrollUnroll {
      0% {
        clip-path: inset(0 0 82% 0);
        transform: translateY(0) scale(0.98);
      }
      25% {
        clip-path: inset(0 0 62% 0);
        transform: translateY(0) scale(0.99);
      }
      50% {
        clip-path: inset(0 0 38% 0);
        transform: translateY(0) scale(1);
      }
      75% {
        clip-path: inset(0 0 14% 0);
        transform: translateY(0) scale(1.005);
      }
      100% {
        clip-path: inset(0 0 0 0);
        transform: translateY(0) scale(1);
      }
    }

    @keyframes floatIdle {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-8px) scale(1.003);
      }
    }

    @keyframes topShadowIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes hintIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 1100px) {
      .scroll-stage {
        width: min(96vw, 1500px);
      }
    }

    @media (max-width: 800px) {
      body {
        overflow: auto;
      }

      .scene {
        min-height: 100vh;
        height: auto;
        padding: 90px 10px 70px;
      }

      .scroll-stage {
        width:   min(75vw, 1100px);
      }

      .hint {
        font-size: 12px;
        bottom: 14px;
      }

      .back-button {
        top: 14px;
        left: 14px;
        font-size: 12px;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="intro-fade"></div>

  <button class="back-button" onclick="window.location.href='index.html'">Zurück</button>

  <main class="scene">
    <div class="scroll-stage">
      <div class="scroll-wrap" id="scrollWrap">
        <img src="scroll.png" alt="Schriftrolle des RRUGES MC" class="scroll-image" />
        <div class="scroll-top-shadow"></div>
      </div>
    </div>
  </main>

  <div class="hint">Die Schriftrolle rollt sich auf</div>
</body>
</html>
