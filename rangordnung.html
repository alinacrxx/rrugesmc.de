<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RRUGES – Rangordnung</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      background: url('background.png') center / cover no-repeat;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(8,0,0,0.35);
      z-index: 0;
    }

    .intro-fade {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 50;
      animation: fadeIntro 1.2s ease forwards;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .scroll {
      width: min(75vw, 1100px);
      transform-origin: top;
      clip-path: inset(0 0 100% 0);
      opacity: 0;

      animation:
        drop 0.8s ease-out forwards,
        unroll 1.5s ease forwards 0.8s,
        float 5s ease-in-out infinite 2.5s;
    }

    .scroll img {
      width: 100%;
      display: block;
    }

    .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 30;

      padding: 10px 16px;
      border-radius: 999px;
      border: none;

      background: rgba(45,10,10,0.85);
      color: #f2d7b1;
      cursor: pointer;
    }

    /* Animationen */

    @keyframes fadeIntro {
      to { opacity: 0; visibility: hidden; }
    }

    @keyframes drop {
      from {
        opacity: 0;
        transform: translateY(-100px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes unroll {
      from { clip-path: inset(0 0 90% 0); }
      to { clip-path: inset(0 0 0 0); }
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>

<body>

<div class="intro-fade"></div>

<button class="back-button" onclick="window.location.href='kodex.html'">
  Zurück
</button>

<div class="scene">

  <div class="scroll" onclick="goNext()">
    <img src="scroll_rangordnung.png">
  </div>

</div>

</body>
</html>
