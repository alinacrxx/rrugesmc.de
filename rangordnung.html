<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RRUGES – Rangordnung</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      position: relative;
      background: url('background.png') center / cover no-repeat;
      transition: opacity 0.5s ease;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(8, 0, 0, 0.35);
      z-index: 0;
    }

    .intro-fade {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 50;
      animation: fadeIntro 1.2s ease forwards;
      pointer-events: none;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
      padding: 20px;
      overflow: hidden;
    }

    .scroll {
      width: min(75vw, 1100px);
      transform-origin: top;
      clip-path: inset(0 0 100% 0);
      opacity: 0;
      cursor: pointer;
      transition: transform 0.25s ease, filter 0.25s ease;
      animation:
        drop 0.8s ease-out forwards,
        unroll 1.5s ease forwards 0.8s,
        float 5s ease-in-out infinite 2.5s;
      filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.4));
    }

    .scroll:hover {
      transform: scale(1.02);
      filter: brightness(1.05) drop-shadow(0 18px 36px rgba(0, 0, 0, 0.4));
    }

    .scroll img {
      width: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 30;
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      background: rgba(45, 10, 10, 0.85);
      color: #f2d7b1;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .back-button:hover {
      transform: scale(1.04);
      background: rgba(70, 14, 14, 0.92);
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(35, 10, 10, 0.78);
      color: #f2d7b1;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0;
      animation: hintIn 0.8s ease forwards 2.2s;
      pointer-events: none;
    }

    @keyframes fadeIntro {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    @keyframes drop {
      from {
        opacity: 0;
        transform: translateY(-100px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes unroll {
      from {
        clip-path: inset(0 0 90% 0);
      }
      to {
        clip-path: inset(0 0 0 0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes hintIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 1100px) {
      .scroll {
        width: min(88vw, 1100px);
      }
    }

    @media (max-width: 800px) {
      body {
        overflow: auto;
      }

      .scene {
        min-height: 100vh;
        height: auto;
        padding: 90px 10px 70px;
      }

      .scroll {
        width: 96vw;
      }

      .back-button {
        top: 14px;
        left: 14px;
        font-size: 12px;
        padding: 10px 14px;
      }

      .hint {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="intro-fade"></div>

  <button class="back-button" onclick="window.location.href='kodex.html'">
    Zurück
  </button>

  <div class="scene">
    <div class="scroll" onclick="goNext()">
      <img src="scroll_rangordnung.png" alt="Rangordnung">
    </div>
  </div>

  <div class="hint">Klick auf die Schriftrolle</div>

  <script>
    function goNext() {
      document.body.style.opacity = "0";

      setTimeout(() => {
        window.location.href = "kleidung.html";
      }, 500);
    }
  </script>
</body>
</html>
