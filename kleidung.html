<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RRUGES – Fraktionskleidung</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      position: relative;
      background: url('background.png') center / cover no-repeat;
      transition: opacity 0.5s ease;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(8, 0, 0, 0.34);
      z-index: 0;
    }

    .intro-fade {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 50;
      animation: fadeIntro 1.2s ease forwards;
      pointer-events: none;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
      overflow: hidden;
      padding: 20px;
    }

    .scroll-stage {
      position: relative;
      width: min(82vw, 1250px);
      perspective: 1400px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .scroll-wrap {
      position: relative;
      width: 100%;
      opacity: 0;
      transform-origin: top center;
      clip-path: inset(0 0 100% 0);
      filter: drop-shadow(0 22px 40px rgba(0, 0, 0, 0.42));
      animation:
        scrollDrop 0.9s ease-out forwards,
        scrollUnroll 1.5s ease-out forwards 0.85s,
        floatIdle 4.6s ease-in-out infinite 2.8s;
    }

    .scroll-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .top-shadow {
      position: absolute;
      left: 6%;
      top: 0;
      width: 88%;
      height: 18%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0));
      opacity: 0;
      pointer-events: none;
      animation: shadowIn 0.7s ease forwards 1.1s;
    }

    .back-button {
      position: absolute;
      top: 22px;
      left: 22px;
      z-index: 40;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: rgba(45, 10, 10, 0.82);
      color: #f2d7b1;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .back-button:hover {
      transform: scale(1.04);
      background: rgba(70, 14, 14, 0.9);
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.28);
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(35, 10, 10, 0.78);
      color: #f2d7b1;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      opacity: 0;
      animation: hintIn 0.8s ease forwards 2.4s;
      pointer-events: none;
    }

    @keyframes fadeIntro {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    @keyframes scrollDrop {
      0% {
        opacity: 0;
        transform: translateY(-100px) scale(0.94) rotateX(14deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(0.985) rotateX(0deg);
      }
    }

    @keyframes scrollUnroll {
      0% {
        clip-path: inset(0 0 84% 0);
        transform: scale(0.985);
      }
      25% {
        clip-path: inset(0 0 62% 0);
        transform: scale(0.992);
      }
      50% {
        clip-path: inset(0 0 38% 0);
        transform: scale(1);
      }
      75% {
        clip-path: inset(0 0 14% 0);
        transform: scale(1.004);
      }
      100% {
        clip-path: inset(0 0 0 0);
        transform: scale(1);
      }
    }

    @keyframes floatIdle {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes shadowIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes hintIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 1100px) {
      .scroll-stage {
        width: min(92vw, 1250px);
      }
    }

    @media (max-width: 800px) {
      body {
        overflow: auto;
      }

      .scene {
        min-height: 100vh;
        height: auto;
        padding: 90px 10px 70px;
      }

      .scroll-stage {
        width: 98vw;
      }

      .back-button {
        top: 14px;
        left: 14px;
        font-size: 12px;
        padding: 10px 14px;
      }

      .hint {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="intro-fade"></div>

  <button class="back-button" onclick="window.location.href='rangordnung.html'">
    Zurück
  </button>

  <main class="scene">
    <div class="scroll-stage">
      <div class="scroll-wrap">
        <img src="scroll_kleidung.png" alt="Fraktionskleidung" class="scroll-image">
        <div class="top-shadow"></div>
      </div>
    </div>
  </main>

  <div class="hint">Fraktionskleidung</div>
</body>
</html>
